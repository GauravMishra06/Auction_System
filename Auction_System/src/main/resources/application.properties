spring.application.name=Auction_System
# =====================================================================
# ONLINE AUCTION SYSTEM - MYSQL DATABASE CONFIGURATION
# =====================================================================

# 1. Database Connection URL (Points to localhost on standard port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/auction_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# 2. Your Local MySQL Database Credentials (CHANGE THESE to match your MySQL setup)
spring.datasource.username=root
spring.datasource.password=gm_database@06

# 3. Explicitly declare the MySQL modern JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate Settings: Automatically map Java Entity annotations into SQL tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 5. Output active SQL strings into your IntelliJ debugger logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true