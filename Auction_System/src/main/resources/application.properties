spring.application.name=Auction_System
# =====================================================================
# ONLINE AUCTION SYSTEM - MYSQL DATABASE CONFIGURATION
# =====================================================================

# 1. Database Connection URL (Points to localhost on standard port 3306)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/auction_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

# 2. Your Local MySQL Database Credentials (set via environment variables)
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# 3. Explicitly declare the MySQL modern JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate Settings: Automatically map Java Entity annotations into SQL tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 5. Output active SQL strings into your IntelliJ debugger logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 6. Disable open-in-view to avoid lazy-loading pitfalls in controllers
spring.jpa.open-in-view=false

# Security and auth settings
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}
app.captcha.ttl-seconds=${APP_CAPTCHA_TTL_SECONDS:120}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.password-reset.frontend-url=${APP_PASSWORD_RESET_FRONTEND_URL:http://localhost:3000/reset-password}